<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parolni o‘zgartirish</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- TOP BAR -->
    <div class="fixed top-0 left-0 right-0 bg-white shadow p-4 text-center font-bold z-50">
        🔒 Parolni o‘zgartirish
    </div>

    <!-- CONTENT -->
    <div class="pt-16 pb-10 px-4">

        <!-- FORM CARD -->
        <form method="post" class="bg-white rounded-xl shadow p-5 space-y-4">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit"
                class="w-full bg-blue-500 text-white py-3 rounded-xl text-lg font-semibold">
                O‘zgartirish
            </button>
        </form>

        <!-- BACK BUTTON -->
        <a href="{% url 'profile' %}"
           class="block mt-4 text-center bg-gray-200 py-3 rounded-xl">
           ⬅️ Profilga qaytish
        </a>

    </div>

</body>
</html>
