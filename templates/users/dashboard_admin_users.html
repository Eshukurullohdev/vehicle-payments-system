<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Foydalanuvchilar</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4">

<h1 class="text-2xl font-bold mb-4">Barcha Foydalanuvchilar</h1>

<div class="space-y-3">
    {% for user in users %}
    <div class="bg-white rounded-xl shadow p-4 flex items-center space-x-4">
        <!-- PROFIL RASMI -->
        {% if user.profile_image %}
            <img src="{{ user.profile_image.url }}" class="w-12 h-12 rounded-full object-cover">
        {% else %}
            <div class="w-12 h-12 rounded-full bg-gray-300 flex items-center justify-center">
                👤
            </div>
        {% endif %}

        <!-- TELEFON RAQAMI -->
        <div class="font-semibold text-lg">{{ user.phone }}</div>
    </div>
    {% endfor %}
</div>

</body>
</html>
